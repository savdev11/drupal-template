name: ${COMPOSE_PROJECT_NAME:-drupal_template}

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    image: ${APP_NAME:-drupal-template}/php:${APP_ENV:-local}
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-local}
      PHP_MEMORY_LIMIT: ${PHP_MEMORY_LIMIT:-512M}
      PHP_MAX_EXECUTION_TIME: ${PHP_MAX_EXECUTION_TIME:-120}
      XDEBUG_MODE: ${XDEBUG_MODE:-off}
      XDEBUG_CLIENT_HOST: ${XDEBUG_CLIENT_HOST:-host.docker.internal}
      XDEBUG_CLIENT_PORT: ${XDEBUG_CLIENT_PORT:-9003}
      DB_NAME: ${DB_NAME:-drupal}
      DB_USER: ${DB_USER:-drupal}
      DB_PASSWORD: ${DB_PASSWORD:-drupal}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_DRIVER: ${DB_DRIVER:-mysql}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      DRUPAL_HASH_SALT: ${DRUPAL_HASH_SALT:-change-me}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
      TRUSTED_HOST_PATTERNS: ${TRUSTED_HOST_PATTERNS:-^localhost$,^127\\.0\\.0\\.1$}
      DRUPAL_FILES_PRIVATE_PATH: ${DRUPAL_FILES_PRIVATE_PATH:-/var/www/private}
      DRUPAL_FILES_TEMP_PATH: ${DRUPAL_FILES_TEMP_PATH:-/tmp}
      REVERSE_PROXY: ${REVERSE_PROXY:-true}
      VARNISH_PURGER_HOST: ${VARNISH_PURGER_HOST:-varnish}
      VARNISH_PURGER_PORT: ${VARNISH_PURGER_PORT:-80}
      STAGE_FILE_PROXY_ORIGIN: ${STAGE_FILE_PROXY_ORIGIN:-https://example.com}
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_PROTOCOL: ${SMTP_PROTOCOL:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - private-files:/var/www/private
      - public-files:/var/www/html/web/sites/default/files
    networks:
      - internal

  web:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    image: ${APP_NAME:-drupal-template}/nginx:${APP_ENV:-local}
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
    volumes:
      - public-files:/var/www/html/web/sites/default/files
    networks:
      - internal

  varnish:
    image: varnish:7.5
    restart: unless-stopped
    depends_on:
      web:
        condition: service_started
    command: ["varnishd", "-F", "-f", "/etc/varnish/default.vcl", "-a", ":80", "-s", "malloc,256m"]
    ports:
      - "${VARNISH_PORT:-8080}:80"
    volumes:
      - ./docker/varnish/default.vcl:/etc/varnish/default.vcl:ro
    networks:
      - internal

  db:
    image: mariadb:11.4
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_NAME:-drupal}
      MARIADB_USER: ${DB_USER:-drupal}
      MARIADB_PASSWORD: ${DB_PASSWORD:-drupal}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-drupal_root}
    command: ["--transaction-isolation=READ-COMMITTED", "--binlog-format=ROW", "--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    volumes:
      - db-data:/var/lib/mysql
    ports:
      - "${DB_EXPOSE_PORT:-33060}:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 8
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "${REDIS_EXPOSE_PORT:-63790}:6379"
    networks:
      - internal

  mailpit:
    image: axllent/mailpit:v1.20
    restart: unless-stopped
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_HTTP_PORT:-8025}:8025"
    profiles: ["devtools"]
    networks:
      - internal

volumes:
  db-data:
  public-files:
  private-files:

networks:
  internal:
    driver: bridge
