local:
  root: /var/www/html/web
  uri: http://localhost:8080

stage:
  host: ${env.REMOTE_SSH_HOST}
  user: ${env.REMOTE_SSH_USER}
  root: ${env.REMOTE_PROJECT_PATH}/web
  uri: https://stage.example.com
  paths:
    drush-script: ${env.REMOTE_PROJECT_PATH}/vendor/bin/drush

prod:
  host: ${env.REMOTE_SSH_HOST}
  user: ${env.REMOTE_SSH_USER}
  root: ${env.REMOTE_PROJECT_PATH}/web
  uri: https://www.example.com
  paths:
    drush-script: ${env.REMOTE_PROJECT_PATH}/vendor/bin/drush
